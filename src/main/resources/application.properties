spring.application.name=agendaamigos

spring.datasource.url=jdbc:mysql://localhost:3306/friends_agenda
spring.datasource.username=friends_agenda
spring.datasource.password=passfriendsagenda
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Neo4j
spring.neo4j.uri=neo4j://127.0.0.1:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=passfriendsagenda
spring.neo4j.database=friendsagenda
